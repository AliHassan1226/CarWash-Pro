name: car_wash_app
description: A modern car wash booking and management app built with Flutter using MVVM architecture.
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.0.0

  # Networking & API
  http: ^1.1.0
  dio: ^5.3.0

  # Local Storage
  shared_preferences: ^2.2.0
  sqflite: ^2.3.0

  # Serialization
  json_annotation: ^4.8.1

  # Date & Time
  intl: ^0.19.0

  # Navigation
  go_router: ^11.1.0

  # UI Components
  cupertino_icons: ^1.0.2
  flutter_svg: ^2.0.0
  cached_network_image: ^3.3.0

  # Location & Maps
  geolocator: ^9.0.0
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Payments
  razorpay_flutter: ^1.3.0

  # Notifications
  firebase_messaging: ^15.0.3

  # Analytics
  firebase_analytics: ^11.1.0

  # Logging
  logger: ^2.0.0

  # Utilities
  connectivity_plus: ^5.0.0
  uuid: ^4.0.0

  get_it: ^9.2.1
  firebase_core: ^3.1.1
  cloud_firestore: ^5.0.2
  firebase_auth: ^5.1.2
  pdf: ^3.12.0
  printing: ^5.14.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.6
  mockito: ^5.4.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/car_wash.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/car_wash.png
    - assets/images/Carwash.png
